<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#ff6f61">
  <title>🗓️ Meus Lembretes</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #ff9ec6, #a1e4ff, #fff176);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      border: 4px solid #ffb3ba;
    }
    h1 {
      text-align: center;
      color: #d81b60;
      margin-bottom: 20px;
      font-size: 28px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    label {
      font-weight: bold;
      color: #555;
      font-size: 14px;
    }
    input, textarea, select {
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }
    input:focus { border-color: #ff6f61; }
    textarea { resize: vertical; min-height: 60px; }
    .row { display: flex; gap: 12px; }
    .row > .input-group { flex: 1; }
    
    button {
      background: #ff6f61;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
      font-size: 16px;
      margin-top: 8px;
    }
    button:hover { background: #ff4b3a; }

    .reminders-list { list-style: none; margin-top: 24px; }
    .reminder-item {
      background: #fdf6f0;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 14px;
      border-left: 5px solid #ff6f61;
      transition: transform 0.2s;
    }
    .reminder-item.completed {
      opacity: 0.6;
      border-left-color: #4caf50;
    }
    .reminder-item.completed .reminder-title {
      text-decoration: line-through;
    }
    .reminder-title {
      font-weight: bold;
      font-size: 18px;
      color: #d81b60;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .reminder-meta { font-size: 13px; color: #555; margin: 6px 0; }
    .reminder-text { color: #444; margin-top: 6px; font-size: 15px; }
    .reminder-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
    }
    .btn-done { background: #4caf50; font-size: 14px; }
    .btn-delete { background: #f44336; font-size: 14px; }
    
    .recurrence-badge {
      background: #e3f2fd;
      color: #1976d2;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
    }
    .notification-tip {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #d81b60;
      background: #fff0f0;
      padding: 8px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lembretes ✅</h1>

    <div class="input-group">
      <label for="title">O que precisa lembrar? *</label>
      <input type="text" id="title" placeholder="Ex: Tomar remédio, Reunião..." />
    </div>

    <div class="input-group">
      <label for="description">Detalhes (opcional)</label>
      <textarea id="description" placeholder="Adicione notas aqui..."></textarea>
    </div>

    <div class="row">
      <div class="input-group">
        <label for="date">Data</label>
        <input type="date" id="date" />
      </div>
      <div class="input-group">
        <label for="time">Hora</label>
        <input type="time" id="time" />
      </div>
    </div>

    <div class="input-group">
      <label for="recurrence">Repetir?</label>
      <select id="recurrence">
        <option value="">Não repetir</option>
        <option value="daily">Todo dia</option>
        <option value="weekly">Toda semana</option>
        <option value="monthly">Todo mês</option>
      </select>
    </div>

    <button id="add-btn">✅ Adicionar Lembrete</button>
    <div class="notification-tip">🔔 Mantenha esta aba aberta para ouvir os alertas!</div>

    <ul class="reminders-list" id="reminders-list"></ul>
  </div>

  <audio id="notification-sound" preload="auto">
    <source src="https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3" type="audio/mpeg">
  </audio>

  <script>
    const titleInput = document.getElementById('title');
    const descInput = document.getElementById('description');
    const dateInput = document.getElementById('date');
    const timeInput = document.getElementById('time');
    const recurrenceSelect = document.getElementById('recurrence');
    const addBtn = document.getElementById('add-btn');
    const listEl = document.getElementById('reminders-list');
    const audio = document.getElementById('notification-sound');

    let reminders = JSON.parse(localStorage.getItem('reminders')) || [];
    let userHasInteracted = false;

    // Inicializar data de hoje no input
    dateInput.value = new Date().toISOString().split('T')[0];

    function saveReminders() {
      localStorage.setItem('reminders', JSON.stringify(reminders));
    }

    function requestNotificationPermission() {
      if (window.Notification && Notification.permission === 'default') {
        Notification.requestPermission();
      }
      userHasInteracted = true;
    }

    function showNotification(title, body) {
      if (window.Notification && Notification.permission === 'granted') {
        new Notification('📌 Lembrete!', { body, icon: 'https://cdn-icons-png.flaticon.com/512/2526/2526240.png' });
      }
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Áudio aguardando interação..."));
      }
    }

    function checkDueReminders() {
      const now = new Date();
      // Ajuste para fuso horário local e formato YYYY-MM-DD
      const offset = now.getTimezoneOffset() * 60000;
      const localISODate = new Date(now - offset).toISOString();
      
      const nowDate = localISODate.split('T')[0];
      const nowTime = now.toTimeString().substring(0, 5);

      let changed = false;

      reminders.forEach((reminder, index) => {
        if (reminder.done) return;

        if (reminder.date === nowDate && reminder.time === nowTime) {
          showNotification(reminder.title, reminder.description || 'Hora da sua atividade!');

          if (reminder.recurrence) {
            // Calcula próxima data
            let nextDate = new Date(reminder.date + 'T' + reminder.time);
            if (reminder.recurrence === 'daily') nextDate.setDate(nextDate.getDate() + 1);
            else if (reminder.recurrence === 'weekly') nextDate.setDate(nextDate.getDate() + 7);
            else if (reminder.recurrence === 'monthly') nextDate.setMonth(nextDate.getMonth() + 1);
            
            reminders[index].date = nextDate.toISOString().split('T')[0];
          } else {
            reminders[index].done = true;
          }
          changed = true;
        }
      });

      if (changed) {
        saveReminders();
        renderReminders();
      }
    }

    // Checa a cada 30 segundos para não perder o minuto exato
    setInterval(checkDueReminders, 30000);

    function renderReminders() {
      listEl.innerHTML = '';
      const mapRec = { daily: 'Diário', weekly: 'Semanal', monthly: 'Mensal' };

      reminders.forEach((reminder, index) => {
        const li = document.createElement('li');
        li.className = `reminder-item ${reminder.done ? 'completed' : ''}`;

        const dateDisplay = reminder.date ? reminder.date.split('-').reverse().join('/') : '';
        const recurrenceTag = reminder.recurrence ? `<span class="recurrence-badge">🔁 ${mapRec[reminder.recurrence]}</span>` : '';

        li.innerHTML = `
          <div class="reminder-title">
            <span>${reminder.title}</span>
            ${recurrenceTag}
          </div>
          <div class="reminder-meta">📆 ${dateDisplay} ${reminder.time ? 'às ' + reminder.time : ''}</div>
          ${reminder.description ? `<div class="reminder-text">${reminder.description}</div>` : ''}
          <div class="reminder-actions">
            <button class="btn-done" onclick="toggleDone(${index})">${reminder.done ? '↩️ Refazer' : '✅ Concluir'}</button>
            <button class="btn-delete" onclick="deleteReminder(${index})">🗑️ Excluir</button>
          </div>
        `;
        listEl.appendChild(li);
      });
    }

    function addReminder() {
      requestNotificationPermission();
      const title = titleInput.value.trim();
      if (!title) return alert('Dê um título ao lembrete!');

      reminders.push({
        title,
        description: descInput.value.trim(),
        date: dateInput.value || null,
        time: timeInput.value || null,
        recurrence: recurrenceSelect.value || null,
        done: false
      });

      saveReminders();
      renderReminders();
      titleInput.value = '';
      descInput.value = '';
      titleInput.focus();
    }

    window.toggleDone = (index) => {
      reminders[index].done = !reminders[index].done;
      saveReminders();
      renderReminders();
    };

    window.deleteReminder = (index) => {
      if (confirm('Excluir este lembrete?')) {
        reminders.splice(index, 1);
        saveReminders();
        renderReminders();
      }
    };

    addBtn.addEventListener('click', addReminder);
    titleInput.addEventListener('keypress', (e) => e.key === 'Enter' && addReminder());

    // Início
    renderReminders();
  </script>
</body>
</html>
